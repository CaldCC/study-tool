<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Tool</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #5b5fc7;
      --accent-hover: #4a4fb8;
      --surface: #ffffff;
      --bg: #f3f4f8;
      --border: #e2e4ec;
      --text: #1a1b2e;
      --muted: #7b7f9e;
      --danger-bg: #fff0f0;
      --danger-border: #fcc;
      --danger-text: #c0392b;
      --left-width: 380px;
      --topbar-height: 52px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
    }

    /* ── Top bar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      z-index: 100;
      gap: 0.6rem;
    }
    .topbar-logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .topbar-logo svg { width: 16px; height: 16px; fill: #fff; }
    .topbar h1 { font-size: 1rem; font-weight: 650; letter-spacing: -0.01em; }
    .topbar-sub { font-size: 0.8rem; color: var(--muted); margin-left: 0.25rem; }

    /* ── Main layout ── */
    .layout {
      display: flex;
      height: 100vh;
      padding-top: var(--topbar-height);
    }

    /* ── Left panel ── */
    .left {
      width: var(--left-width);
      min-width: var(--left-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 1.5rem;
      gap: 1.25rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    /* Input type tabs */
    .input-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .input-tab-btn {
      flex: 1;
      padding: 0.4rem 0;
      border: none;
      background: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .input-tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Text inputs */
    input[type="text"], input[type="url"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus, input[type="url"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,95,199,0.12);
    }
    input::placeholder { color: #b0b3c8; }

    /* File drop */
    .file-drop {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 1.75rem 1rem;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.85rem;
      transition: border-color 0.15s, background 0.15s;
    }
    .file-drop:hover, .file-drop.dragover {
      border-color: var(--accent);
      background: rgba(91,95,199,0.04);
    }
    .file-drop input { display: none; }
    .file-drop-icon { font-size: 1.6rem; }
    .file-name-display {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 500;
      margin-top: 0.25rem;
      word-break: break-all;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 0.7rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-submit:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-submit:active:not(:disabled) { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Error */
    .error-box {
      display: none;
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      font-size: 0.85rem;
      color: var(--danger-text);
      line-height: 1.4;
    }
    .error-box.active { display: block; }

    /* ── Right panel ── */
    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }
    .empty-state-icon {
      width: 60px; height: 60px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 0.25rem;
    }
    .empty-state h2 { font-size: 1rem; font-weight: 600; color: #5a5d7a; }
    .empty-state p { font-size: 0.85rem; max-width: 280px; line-height: 1.5; }

    /* Loading state */
    .loading-state {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .loading-state.active { display: flex; }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.88rem; color: var(--muted); }

    /* Output panel */
    .output-panel {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      animation: fadeIn 0.25s ease;
    }
    .output-panel.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    /* Output tabs */
    .output-tabs {
      display: flex;
      gap: 0;
    }
    .output-tab-btn {
      padding: 0.9rem 1.25rem;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .output-tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    .output-tab-btn:hover:not(.active) { color: var(--text); }

    /* Download buttons in header */
    .dl-actions { display: flex; gap: 0.4rem; }
    .btn-dl {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: var(--surface);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      transition: background 0.12s, border-color 0.12s;
    }
    .btn-dl:hover { background: var(--bg); border-color: #c5c8db; }
    .btn-dl svg { width: 13px; height: 13px; fill: currentColor; }

    /* Tab content areas */
    .output-body {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
    }

    .out-tab { display: none; }
    .out-tab.active { display: block; }

    /* Markdown styles */
    .md h1 { font-size: 1.35rem; font-weight: 700; margin: 0 0 1rem; }
    .md h2 { font-size: 1.05rem; font-weight: 650; margin: 1.75rem 0 0.6rem; color: #1e3a5f; padding-bottom: 0.3rem; border-bottom: 2px solid #d0d9f0; }
    .md h3 { font-size: 0.95rem; font-weight: 600; margin: 1rem 0 0.4rem; }
    .md p { margin: 0.5rem 0; line-height: 1.7; color: #2a2c42; }
    .md ul, .md ol { padding-left: 1.4rem; }
    .md li { margin: 0.3rem 0; line-height: 1.6; color: #2a2c42; }
    .md strong { font-weight: 700; color: #1e3a5f; }

    /* ── Table base — shared structure ── */
    .md table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.865rem;
      margin: 0.5rem 0 1.75rem;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #c5cee0;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
    }
    .md th {
      background: #1e3a5f;
      color: #fff;
      font-weight: 600;
      padding: 0.65rem 0.9rem;
      text-align: left;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-right: 1px solid rgba(255,255,255,0.15);
    }
    .md th:last-child { border-right: none; }
    .md td {
      padding: 0.55rem 0.9rem;
      border-bottom: 1px solid #dde3f0;
      border-right: 1px solid #edf0f8;
      vertical-align: top;
      line-height: 1.5;
    }
    .md td:last-child { border-right: none; }
    .md tr:last-child td { border-bottom: none; }
    .md tr:nth-child(odd) td  { background: #f4f6fd; }
    .md tr:nth-child(even) td { background: #ffffff; }
    .md tr:hover td { background: #e8edff; transition: background 0.1s; }

    /* ── Colour palette per table type ── */

    /* 📊 Reference / Master — Navy */
    .md table.tbl-reference th              { background: #1e3a5f; border-right-color: #2d5282; }
    .md table.tbl-reference tr:nth-child(odd) td  { background: #f0f4ff; }
    .md table.tbl-reference tr:hover td    { background: #dce6ff; }

    /* ⚠️ Deficiency / Signs / Issues / Risk — Red */
    .md table.tbl-deficiency th              { background: #8b1a1a; border-right-color: #a52828; }
    .md table.tbl-deficiency tr:nth-child(odd) td  { background: #fff4f4; }
    .md table.tbl-deficiency tr:nth-child(even) td { background: #fff8f8; }
    .md table.tbl-deficiency tr:hover td    { background: #ffe0e0; }

    /* 🚨 Toxicity / Limits / Danger — Crimson */
    .md table.tbl-toxicity th              { background: #6b1a00; border-right-color: #852200; }
    .md table.tbl-toxicity tr:nth-child(odd) td  { background: #fff5f0; }
    .md table.tbl-toxicity tr:nth-child(even) td { background: #fff9f7; }
    .md table.tbl-toxicity tr:hover td    { background: #ffe8e0; }

    /* 💊 Interactions / Drug / Pairs — Green */
    .md table.tbl-interaction th              { background: #1a5c35; border-right-color: #226b40; }
    .md table.tbl-interaction tr:nth-child(odd) td  { background: #f0fff5; }
    .md table.tbl-interaction tr:nth-child(even) td { background: #f8fffb; }
    .md table.tbl-interaction tr:hover td    { background: #d6f5e3; }

    /* 🧠 Acronyms / Memory — Amber */
    .md table.tbl-acronym th              { background: #7a4500; border-right-color: #8f5200; }
    .md table.tbl-acronym tr:nth-child(odd) td  { background: #fffaf0; }
    .md table.tbl-acronym tr:nth-child(even) td { background: #fffcf7; }
    .md table.tbl-acronym tr:hover td    { background: #ffefc0; }

    /* 🤰 Special Groups / Life stage — Purple */
    .md table.tbl-special th              { background: #4a1a7a; border-right-color: #5b2290; }
    .md table.tbl-special tr:nth-child(odd) td  { background: #f8f0ff; }
    .md table.tbl-special tr:nth-child(even) td { background: #fbf7ff; }
    .md table.tbl-special tr:hover td    { background: #ecd9ff; }

    /* 🦴 Groupings / Bundles / Structural — Teal */
    .md table.tbl-group th              { background: #1a4a5c; border-right-color: #215870; }
    .md table.tbl-group tr:nth-child(odd) td  { background: #f0f8ff; }
    .md table.tbl-group tr:nth-child(even) td { background: #f7fbff; }
    .md table.tbl-group tr:hover td    { background: #d6edff; }

    /* Table section heading label — coloured pill above each table */
    .tbl-label {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      margin-bottom: 0.4rem;
      margin-top: 1.25rem;
    }
    .tbl-label-reference  { background: #dce6ff; color: #1e3a5f; }
    .tbl-label-deficiency { background: #ffe0e0; color: #8b1a1a; }
    .tbl-label-toxicity   { background: #ffe5d8; color: #6b1a00; }
    .tbl-label-interaction{ background: #d6f5e3; color: #1a5c35; }
    .tbl-label-acronym    { background: #ffefc0; color: #7a4500; }
    .tbl-label-special    { background: #ecd9ff; color: #4a1a7a; }
    .tbl-label-group      { background: #d6edff; color: #1a4a5c; }
    .tbl-label-default    { background: #e8eaf6; color: #2d3a5c; }

    /* Callout / blockquote */
    .md blockquote {
      border-left: 4px solid var(--accent);
      background: #f0f2ff;
      margin: 0.75rem 0;
      padding: 0.6rem 1rem;
      border-radius: 0 8px 8px 0;
      color: #2a2c5a;
      font-size: 0.9rem;
    }

    /* Flowchart */
    #flowchart-container {
      overflow: auto;
      background: #fafbff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      min-height: 300px;
    }
    #flowchart-container svg {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif !important;
    }
    pre.mermaid-fallback {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 0.82rem;
      overflow: auto;
      white-space: pre-wrap;
      color: var(--muted);
    }
    textarea#flowchart-raw { display: none; }

    /* Scrollbar */
    .output-body::-webkit-scrollbar { width: 5px; }
    .output-body::-webkit-scrollbar-track { background: transparent; }
    .output-body::-webkit-scrollbar-thumb { background: #d0d3e8; border-radius: 10px; }

    /* Print */
    @media print {
      .topbar, .left, .output-header { display: none !important; }
      .right { padding: 0; }
      .output-panel { display: flex !important; }
      .out-tab { display: none !important; }
      #out-one-pager { display: block !important; }
      .output-body { padding: 1rem; }
    }

    /* Responsive: stack on small screens */
    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .left { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm1 11H9V9h2v4zm0-6H9V5h2v2z"/></svg>
    </div>
    <h1>Study Tool</h1>
    <span class="topbar-sub">powered by Claude</span>
  </header>

  <div class="layout">

    <!-- ── Left: input ── -->
    <aside class="left">

      <div>
        <div class="section-label">Input source</div>
        <div class="input-tabs" id="input-tabs">
          <button class="input-tab-btn active" data-tab="url-panel">URL</button>
          <button class="input-tab-btn" data-tab="doi-panel">DOI</button>
          <button class="input-tab-btn" data-tab="pdf-panel">PDF</button>
        </div>
      </div>

      <!-- URL -->
      <div id="url-panel" class="tab-panel active">
        <div class="section-label">Web page URL</div>
        <input type="url" id="url-input" placeholder="https://en.wikipedia.org/wiki/..." />
      </div>

      <!-- DOI -->
      <div id="doi-panel" class="tab-panel">
        <div class="section-label">Digital Object Identifier</div>
        <input type="text" id="doi-input" placeholder="10.1038/nature12373" />
      </div>

      <!-- PDF -->
      <div id="pdf-panel" class="tab-panel">
        <div class="section-label">PDF document</div>
        <label class="file-drop" id="file-drop">
          <input type="file" id="pdf-input" accept=".pdf" />
          <span class="file-drop-icon">📄</span>
          <span>Drop a PDF here or click to browse</span>
          <div class="file-name-display" id="file-name"></div>
        </label>
      </div>

      <!-- Error -->
      <div class="error-box" id="error-box"></div>

      <!-- Submit -->
      <button class="btn-submit" id="submit-btn">
        <svg viewBox="0 0 20 20" style="width:15px;height:15px;fill:currentColor;flex-shrink:0"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11H9V5h2v2zm0 6H9V9h2v4z"/></svg>
        Summarise
      </button>

    </aside>

    <!-- ── Right: output ── -->
    <main class="right">

      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">✨</div>
        <h2>Ready to summarise</h2>
        <p>Paste a URL, DOI, or upload a PDF on the left, then click Summarise.</p>
      </div>

      <!-- Loading -->
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Generating summary with Claude…</div>
      </div>

      <!-- Output -->
      <div class="output-panel" id="output-panel">

        <div class="output-header">
          <div class="output-tabs" id="output-tabs">
            <button class="output-tab-btn active" data-out="out-one-pager">One-Pager</button>
            <button class="output-tab-btn" data-out="out-flowchart">Flow Chart</button>
            <button class="output-tab-btn" data-out="out-table">Table</button>
          </div>
          <div class="dl-actions" id="dl-actions">
            <!-- Populated per tab -->
          </div>
        </div>

        <div class="output-body">

          <!-- One-pager -->
          <div class="out-tab active md" id="out-one-pager"></div>

          <!-- Flowchart -->
          <div class="out-tab" id="out-flowchart">
            <div id="flowchart-container"></div>
            <textarea id="flowchart-raw" readonly></textarea>
          </div>

          <!-- Table -->
          <div class="out-tab md" id="out-table"></div>

        </div>
      </div>

    </main>
  </div>

  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: "base",
      themeVariables: {
        primaryColor: "#eef0ff",
        primaryBorderColor: "#5b5fc7",
        lineColor: "#7b7f9e",
        fontSize: "14px",
      },
      mindmap: {
        padding: 16,
        useMaxWidth: true,
      },
      flowchart: {
        curve: "basis",
        padding: 20,
        useMaxWidth: true,
      },
    });

    // ── State ──
    let rawData = null;
    let activeOut = "out-one-pager";

    // ── Tab switching: input ──
    document.querySelectorAll("#input-tabs .input-tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#input-tabs .input-tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    // ── Tab switching: output ──
    const dlConfigs = {
      "out-one-pager": [
        { label: "Download .md", action: () => rawData && dlText(rawData.one_pager, "one-pager.md") },
        { label: "Print", action: () => window.print() },
      ],
      "out-flowchart": [
        { label: "Download SVG", action: () => dlSvg("flowchart.svg") },
        { label: "Copy Mermaid", action: () => rawData && copyText(rawData.flowchart) },
      ],
      "out-table": [
        { label: "Download .md", action: () => rawData && dlText(rawData.table, "table.md") },
      ],
    };

    function renderDlButtons(outId) {
      const wrap = document.getElementById("dl-actions");
      wrap.innerHTML = "";
      (dlConfigs[outId] || []).forEach(cfg => {
        const btn = document.createElement("button");
        btn.className = "btn-dl";
        btn.innerHTML = `<svg viewBox="0 0 20 20"><path d="M13 8h-2V3H9v5H7l3 3 3-3zm-8 7h10v-2H5v2z"/></svg>${cfg.label}`;
        btn.addEventListener("click", cfg.action);
        wrap.appendChild(btn);
      });
    }

    document.querySelectorAll("#output-tabs .output-tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#output-tabs .output-tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".out-tab").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        activeOut = btn.dataset.out;
        document.getElementById(activeOut).classList.add("active");
        renderDlButtons(activeOut);
      });
    });

    // ── File drop ──
    const fileDrop = document.getElementById("file-drop");
    const pdfInput = document.getElementById("pdf-input");
    const fileNameEl = document.getElementById("file-name");

    pdfInput.addEventListener("change", () => {
      if (pdfInput.files[0]) fileNameEl.textContent = pdfInput.files[0].name;
    });
    fileDrop.addEventListener("dragover", e => { e.preventDefault(); fileDrop.classList.add("dragover"); });
    fileDrop.addEventListener("dragleave", () => fileDrop.classList.remove("dragover"));
    fileDrop.addEventListener("drop", e => {
      e.preventDefault();
      fileDrop.classList.remove("dragover");
      const file = e.dataTransfer.files[0];
      if (file?.name.toLowerCase().endsWith(".pdf")) {
        const dt = new DataTransfer();
        dt.items.add(file);
        pdfInput.files = dt.files;
        fileNameEl.textContent = file.name;
      }
    });

    // ── UI state helpers ──
    function showState(name) {
      document.getElementById("empty-state").style.display   = name === "empty"   ? "flex"  : "none";
      document.getElementById("loading-state").classList.toggle("active", name === "loading");
      document.getElementById("output-panel").classList.toggle("active", name === "output");
    }

    function showError(msg) {
      const el = document.getElementById("error-box");
      el.textContent = msg;
      el.classList.add("active");
    }
    function clearError() {
      document.getElementById("error-box").classList.remove("active");
    }

    // ── Render results ──
    async function renderResults(data) {
      rawData = data;

      const onePagerEl = document.getElementById("out-one-pager");
      onePagerEl.innerHTML = marked.parse(data.one_pager);
      classifyTables(onePagerEl);

      const tableEl = document.getElementById("out-table");
      tableEl.innerHTML = marked.parse(data.table);
      classifyTables(tableEl);

      const container = document.getElementById("flowchart-container");
      container.innerHTML = "";
      try {
        const { svg } = await mermaid.render("mermaid-graph", data.flowchart);
        container.innerHTML = svg;
      } catch (_) {
        container.innerHTML = `<pre class="mermaid-fallback">${escapeHtml(data.flowchart)}</pre>`;
      }
      document.getElementById("flowchart-raw").value = data.flowchart;

      // Reset to first tab
      document.querySelectorAll("#output-tabs .output-tab-btn").forEach((b, i) => b.classList.toggle("active", i === 0));
      document.querySelectorAll(".out-tab").forEach((p, i) => p.classList.toggle("active", i === 0));
      activeOut = "out-one-pager";
      renderDlButtons(activeOut);

      showState("output");
    }

    // ── Submit ──
    const submitBtn = document.getElementById("submit-btn");

    async function handleResponse(resp) {
      if (!resp.ok) {
        const body = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(body.detail || resp.statusText);
      }
      return resp.json();
    }

    async function submit(fetchFn) {
      clearError();
      submitBtn.disabled = true;
      showState("loading");
      try {
        const data = await fetchFn();
        await renderResults(data);
      } catch (e) {
        showError(e.message);
        showState(rawData ? "output" : "empty");
      } finally {
        submitBtn.disabled = false;
      }
    }

    submitBtn.addEventListener("click", () => {
      // Determine active input tab
      const activeInputTab = document.querySelector("#input-tabs .input-tab-btn.active")?.dataset.tab;

      if (activeInputTab === "url-panel") {
        const url = document.getElementById("url-input").value.trim();
        if (!url) return showError("Please enter a URL.");
        submit(() => fetch("/process/url", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        }).then(handleResponse));

      } else if (activeInputTab === "doi-panel") {
        const doi = document.getElementById("doi-input").value.trim();
        if (!doi) return showError("Please enter a DOI.");
        submit(() => fetch("/process/doi", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ doi }),
        }).then(handleResponse));

      } else if (activeInputTab === "pdf-panel") {
        const file = pdfInput.files[0];
        if (!file) return showError("Please select a PDF file.");
        const form = new FormData();
        form.append("file", file);
        submit(() => fetch("/process/pdf", { method: "POST", body: form }).then(handleResponse));
      }
    });

    // Enter key
    ["url-input", "doi-input"].forEach(id => {
      document.getElementById(id).addEventListener("keydown", e => {
        if (e.key === "Enter") submitBtn.click();
      });
    });

    // ── Helpers ──
    // ── Table classifier — reads the bold heading before each table and applies a colour class ──
    const TABLE_RULES = [
      { keywords: ['master', 'reference', 'quick ref', 'overview'],            cls: 'tbl-reference' },
      { keywords: ['deficien', 'sign', 'symptom', 'issue', 'risk', 'warning'], cls: 'tbl-deficiency' },
      { keywords: ['toxic', 'upper', 'limit', 'danger', 'overdose', 'safe'],   cls: 'tbl-toxicity' },
      { keywords: ['interact', 'drug', 'deplet', 'pair', 'conflict'],          cls: 'tbl-interaction' },
      { keywords: ['acronym', 'mnemonic', 'memory', 'aid', 'recall'],          cls: 'tbl-acronym' },
      { keywords: ['pregnan', 'life stage', 'special group', 'infant', 'child', 'elder'], cls: 'tbl-special' },
      { keywords: ['group', 'bundle', 'bone', 'structural', 'cluster', 'team', 'antioxidant', 'thyroid'], cls: 'tbl-group' },
    ];

    const LABEL_TEXT = {
      'tbl-reference':   '📊 Master Reference',
      'tbl-deficiency':  '⚠️ Deficiency / Signs',
      'tbl-toxicity':    '🚨 Toxicity & Limits',
      'tbl-interaction': '💊 Interactions',
      'tbl-acronym':     '🧠 Acronyms & Memory',
      'tbl-special':     '🤰 Special Groups',
      'tbl-group':       '🦴 Key Groupings',
      'default':         '📋 Table',
    };

    function classifyTables(container) {
      // Walk every <p> that contains only a <strong> — these are the table headings
      const paras = container.querySelectorAll('p');
      paras.forEach(p => {
        const strong = p.querySelector('strong');
        if (!strong || p.textContent.trim() !== strong.textContent.trim()) return;
        const heading = strong.textContent.toLowerCase();
        const nextEl = p.nextElementSibling;
        if (!nextEl || nextEl.tagName !== 'TABLE') return;

        // Determine class
        let matched = 'default';
        for (const rule of TABLE_RULES) {
          if (rule.keywords.some(k => heading.includes(k))) { matched = rule.cls; break; }
        }

        // Add colour class to table
        nextEl.classList.add(matched);

        // Replace the <p><strong> heading with a styled pill label
        const pill = document.createElement('div');
        pill.className = `tbl-label tbl-label-${matched.replace('tbl-','')}`;
        pill.textContent = LABEL_TEXT[matched] || strong.textContent;
        p.replaceWith(pill);
      });
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
    function copyText(text) {
      navigator.clipboard.writeText(text).catch(() => {
        const ta = Object.assign(document.createElement("textarea"), { value: text });
        document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove();
      });
    }
    function dlText(text, filename) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([text], { type: "text/plain" }));
      a.download = filename; a.click();
    }
    function dlSvg(filename) {
      const svg = document.getElementById("flowchart-container").innerHTML;
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml" }));
      a.download = filename; a.click();
    }

    // Initial state
    showState("empty");
  </script>
</body>
</html>
